spring:
  application:
    name: pubgity
  security:
    oauth2:
      client:
        registration:
          oidc:
            client-id: ${OIDC_CLIENT_ID:change-me}
            client-secret: ${OIDC_CLIENT_SECRET:change-me}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
        provider:
          oidc:
            issuer-uri: ${OIDC_ISSUER_URI:https://keycloak.example.com/realms/pubgity}
  mongodb:
    uri: mongodb://user:password@localhost:27017
    database: pubgity
  task:
    scheduling:
      pool:
        size: 5
pubgity:
  oidc:
    roles-claim: realm_access.roles
pubg:
  api:
    key: pubgApiKey
    base-url: https://api.pubg.com/shards/steam
    endpoints:
      players: /players
      matches: /matches/{matchId}
      seasons: /seasons
      season-stats: /players/{accountId}/seasons/{seasonId}
      lifetime-stats: /players/{accountId}/seasons/lifetime
    rate-limit:
      limit-for-period: 10
      limit-refresh-period: 60s
      timeout-duration: 2m
    retry:
      max-attempts: 3
      backoff: 30s
    match-cache:
      max-size: 500
      ttl: 1h
  player:
    stats-ttl: 7d
  season:
    updateSeasonsCron: 0 0 0 * * ? # every day at midnight
