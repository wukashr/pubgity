<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pubgity - Players</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-white mb-6">PUBG Player Stats</h1>

    <!-- Filter -->
    <form method="get" th:action="@{/players}" class="flex gap-2 mb-6">
        <input type="text" name="filter" th:value="${filter}"
               placeholder="Search player name..."
               class="flex-1 bg-gray-800 border border-gray-600 text-gray-100 rounded px-3 py-2 text-sm
                      focus:outline-none focus:border-blue-500 placeholder-gray-500">
        <button type="submit"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm rounded transition-colors">
            Search
        </button>
        <a href="/players"
           class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm rounded transition-colors">
            Clear
        </a>
    </form>

    <!-- Player List -->
    <div class="overflow-y-auto max-h-[70vh] rounded border border-gray-800">
        <div class="flex flex-col gap-px">
            <a th:each="player : ${players}"
               th:if="${player.id != null}"
               th:href="@{/players/{id}(id=${player.accountId})}"
               class="flex items-center justify-between px-4 py-3 bg-gray-800 hover:bg-gray-700
                  border-b border-gray-700/50 transition-colors group">
                <span th:text="${player.playerName}" class="font-medium text-gray-100 group-hover:text-white"></span>
                <span class="text-xs px-2 py-1 bg-gray-700 group-hover:bg-gray-600 text-gray-400 rounded-full">
                <span th:text="${#sets.size(player.matches.matchIds)}"></span> matches
            </span>
            </a>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(players)}" class="text-gray-500 mt-6 text-center">
        No players found.
        <span th:if="${filter != null && !filter.isEmpty()}">Try a different search.</span>
    </p>
</main>
</body>
</html>
